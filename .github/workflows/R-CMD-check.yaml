# Lightweight core check across OSes and R versions.
#
# Installs the hard dependencies plus only the light / pure-R Suggests. The
# heavy / system-library Suggests (sf, geojsonsf, leaflet, duckdb, RMariaDB) are
# installed and exercised in the separate integration-check workflow; here their
# tests skip themselves via skip_if_not_installed() guards, and
# _R_CHECK_FORCE_SUGGESTS_=false stops R CMD check requiring them.
#
# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      # Hard dependencies only, plus the light/pure-R Suggests. The heavy
      # Suggests (sf/geojsonsf/leaflet/duckdb/RMariaDB) are intentionally omitted.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: >-
            any::rcmdcheck
            any::testthat
            any::withr
            any::commonmark
            any::dplyr
            any::shinyglide
            any::openxlsx
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
