# Fuller integration check on Linux.
#
# Installs ALL Suggests, the GDAL/GEOS/PROJ/UDUNITS system libraries that sf
# needs, and runs a live MariaDB service. This exercises the spatial and backend
# code paths that the lightweight core check (R-CMD-check.yaml) skips.
#
# Note: the package's current test suite does not yet open a MariaDB connection
# (the only MariaDB test just builds a config object), so the service and the
# SFT_MARIADB_* variables are forward-looking infrastructure; they are wired with
# the names the package reads (SFT_MARIADB_USER / SFT_MARIADB_PASSWORD, plus the
# _DB / _HOST / _PORT convention used by the bundled example).
on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'

name: integration-check.yaml

permissions: read-all

jobs:
  integration-check:
    runs-on: ubuntu-latest

    name: integration (ubuntu-latest, release)

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: shinyformtools
          MARIADB_USER: sft
          MARIADB_PASSWORD: sft
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SFT_MARIADB_USER: sft
      SFT_MARIADB_PASSWORD: sft
      SFT_MARIADB_DB: shinyformtools
      SFT_MARIADB_HOST: 127.0.0.1
      SFT_MARIADB_PORT: "3306"

    steps:
      - uses: actions/checkout@v6

      - name: Install system libraries for sf (GDAL/GEOS/PROJ/UDUNITS)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          http-user-agent: 'release'

      # Default dependency resolution installs all Suggests (sf, geojsonsf,
      # leaflet, duckdb, RMariaDB, ...) in addition to the hard dependencies.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
